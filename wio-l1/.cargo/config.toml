[build]
target = "thumbv7em-none-eabihf"

[target.thumbv7em-none-eabihf]
# `cargo run` flashes and attaches a debug session via a probe.
# Requires: cargo install cargo-embed --locked
runner = "cargo embed"
rustflags = [
    "-C",
    "link-arg=-Tlink.x",
    # "-C",
    # "linker=flip-link",
    "-C",
    "codegen-units=1",
]

[env]
DEFMT_LOG = "info"